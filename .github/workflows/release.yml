name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub releases
      id-token: write   # needed for PyPI trusted publishing

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. Install deps & run tests before releasing ─────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich pytest build twine

      - name: Run tests (must pass before release)
        run: pytest tests/ -v --tb=short

      # ── 4. Build the release zip ─────────────────────────────────────────────
      - name: Build release zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="ReconNinja-${TAG}"
          mkdir -p "${STAGING}"
          rsync -av \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='reports/' \
            --exclude='*.egg-info' \
            --exclude="${STAGING}" \
            . "${STAGING}/"
          ZIP_NAME="ReconNinja-${TAG}.zip"
          zip -r "${ZIP_NAME}" "${STAGING}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "--- Release zip contents ---"
          unzip -l "${ZIP_NAME}"

      # ── 5. Extract changelog for this version ────────────────────────────────
      - name: Extract changelog entry
        run: |
          TAG="${GITHUB_REF_NAME}"
          python3 - << 'PYEOF'
          import re, os

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")

          try:
              readme = open("CHANGELOG.md").read()
              pattern = rf"(?m)^##\s+\[?v?{re.escape(version)}\]?.*?\n(.*?)(?=\n^##\s|\Z)"
              m = re.search(pattern, readme, re.DOTALL)
              notes = m.group(1).strip() if m else f"Release {tag}"
          except Exception:
              notes = f"ReconNinja {tag}"

          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          print("Release notes written:")
          print(notes[:500])
          PYEOF

      # ── 6. Create GitHub Release and upload zip ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ReconNinja ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Update AUR package ────────────────────────────────────────────────
     # Note: PKGBUILD uses a git source with sha256sums=('SKIP').
      # pkgver() reads from info/info.py at build time — no sed update needed.
      - name: Set version env
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PKGVER=${VERSION}" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Update PKGBUILD pkgrel
        run: |
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: reconninja
          pkgbuild: ./aur/PKGBUILD
          commit_username: ExploitCraft
          commit_email: emonkk06@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ env.PKGVER }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: true