name: reconninja
channels:
  - defaults
  - conda-forge

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python>=3.10

  # ── Required Python packages ──────────────────────────────────────────────
  - pip
  - pip:
      - rich>=13.0.0        # terminal UI — REQUIRED

  # ── System tools (install via install.sh or manually) ─────────────────────
  # These are NOT conda packages — listed here for documentation only.
  # Run ./install.sh to auto-install all of these.
  #
  # PORT SCANNING
  #   rustscan              → primary port scanner   (cargo install rustscan)
  #   nmap                  → service fingerprinting  (apt install nmap)
  #   masscan               → optional sweep          (apt install masscan)
  #
  # SUBDOMAIN ENUMERATION
  #   subfinder             → go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
  #   amass                 → go install github.com/owasp-amass/amass/v4/...@master
  #   assetfinder           → go install github.com/tomnomnom/assetfinder@latest
  #
  # WEB DETECTION
  #   httpx                 → go install github.com/projectdiscovery/httpx/cmd/httpx@latest
  #   whatweb               → apt install whatweb
  #   nikto                 → apt install nikto
  #
  # DIRECTORY BRUTE FORCE
  #   feroxbuster           → apt install feroxbuster
  #   ffuf                  → go install github.com/ffuf/ffuf/v2@latest
  #   dirsearch             → pip install dirsearch
  #
  # VULNERABILITY SCANNING
  #   nuclei                → go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
  #
  # SCREENSHOTS
  #   aquatone              → github.com/michenriksen/aquatone/releases
  #   gowitness             → go install github.com/sensepost/gowitness@latest
  #
  # WORDLISTS
  #   seclists              → apt install seclists

# ── Quick setup ───────────────────────────────────────────────────────────────
# Create environment:   conda env create -f environment.yml
# Activate:             conda activate reconninja
# Install tools:        chmod +x install.sh && ./install.sh
# Run:                  ReconNinja
